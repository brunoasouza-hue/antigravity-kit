<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;600;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#efffe3",
                        "primary-container": "#39ff14",
                        "on-primary-container": "#053900",
                        "background": "#0c1609",
                        "surface-container-low": "#141e11",
                        "outline-variant": "#3c4b35",
                        "on-surface-variant": "#baccb0"
                    },
                    "fontFamily": {
                        "body-md": ["Space Grotesk"],
                        "display-xl": ["Noto Serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0c1609; color: #dae6d0; }
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
        }
    </style>
</head>
<body class="font-body-md bg-background selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
    <nav class="bg-black/90 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-50">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-2xl mx-auto">
            <a href="index.html" class="text-2xl font-black italic tracking-tighter text-lime-400">Goró da Mansão</a>
            <div class="flex items-center space-x-6 text-lime-400">
                <a href="signup.html" class="text-xs uppercase tracking-widest hover:text-white">Criar Conta</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 py-xxl">
        <div class="w-full max-w-md bg-surface-container-low border border-outline-variant rounded-lg p-8 relative overflow-hidden">
            <div class="absolute inset-0 bg-noise pointer-events-none"></div>
            <div class="relative z-10">
                <h2 class="font-display-xl text-3xl text-primary mb-8 text-center uppercase tracking-widest italic">Acessar Ritual</h2>
                
                <form id="login-form" class="space-y-6">
                    <div class="space-y-sm">
                        <label class="font-label-caps text-on-surface-variant text-xs uppercase tracking-widest">E-mail</label>
                        <input id="email" required class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary-container focus:ring-0 transition-colors py-3 px-0 font-body-md placeholder:text-zinc-700" placeholder="admin@mansao.com" type="email"/>
                    </div>
                    <div class="space-y-sm">
                        <label class="font-label-caps text-on-surface-variant text-xs uppercase tracking-widest">Senha</label>
                        <input id="password" required class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary-container focus:ring-0 transition-colors py-3 px-0 font-body-md placeholder:text-zinc-700" placeholder="••••••••" type="password"/>
                    </div>
                    
                    <button type="submit" class="w-full py-4 bg-primary-container text-on-primary-container font-label-caps text-sm tracking-widest uppercase rounded shadow-[0_0_20px_rgba(57,255,20,0.3)] hover:shadow-[0_0_40px_rgba(57,255,20,0.5)] transition-all active:scale-95">
                        Entrar
                    </button>
                </form>
                
                <p class="mt-8 text-center text-xs text-on-surface-variant">
                    Novo na Mansão? <a href="signup.html" class="text-primary hover:underline">Cadastre-se</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    // Store user data for pre-filling checkout
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Logic to check for admin access
                    // For this ritual, emails ending in @mansao.com have admin access
                    if (email.endsWith('@mansao.com')) {
                        alert('Acesso Administrativo Concedido.');
                        window.location.href = 'admin.html';
                    } else {
                        alert('Login realizado com sucesso!');
                        window.location.href = 'index.html';
                    }
                } else {
                    alert(data.error || 'Credenciais inválidas');
                }
            } catch (err) {
                console.error('Error logging in:', err);
                alert('Erro na conexão com o servidor');
            }
        });
    </script>
</body>
</html>
